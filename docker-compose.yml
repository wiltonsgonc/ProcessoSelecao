services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: processo-selecao-sqlserver
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA}
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
      - sqlserver_log:/var/opt/mssql/log
      - sqlserver_backup:/var/opt/mssql/backup
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
    command: |
      bash -c "
      /opt/mssql/bin/sqlservr &
      for i in {1..30}; do
        if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -C -Q 'SELECT 1' > /dev/null 2>&1; then
          echo 'SQL Server is ready'
          break
        fi
        echo 'Waiting for SQL Server...'
        sleep 1
      done
      echo 'Creating database user for external access...'
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -C -d master -i /docker-entrypoint-initdb.d/init.sql
      wait"

  backend:
    build:
      context: ./src/backend
      dockerfile: ProcessoSelecao.Api/Dockerfile.dev
    container_name: processo-selecao-backend
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__SecretKey=${JWT_SECRETKEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpHost=${SMTP_HOST}
      - EmailSettings__SmtpPort=${SMTP_PORT}
      - EmailSettings__SmtpUser=${SMTP_USER}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - EmailSettings__FromEmail=${FROM_EMAIL}
    ports:
      - "5002:5002"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./src/backend:/src
      - backend_cache:/src/.dotnet
      - ./documentos:/app/documentos

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: processo-selecao-frontend
    environment:
      - NG_HMR=1
      - NG_CLI_ANALYTICS=false
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./src/frontend:/app
      - /app/node_modules

networks:
  processo-selecao-network:
    driver: bridge

volumes:
  sqlserver_data:
  sqlserver_log:
  sqlserver_backup:
  documentos_data:
  backend_cache:
