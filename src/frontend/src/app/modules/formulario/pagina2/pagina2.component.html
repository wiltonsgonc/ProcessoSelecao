<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <h2>Dados Básicos</h2>
  <div class="campo-obrigatorio">
    <label for="nome">Nome: <span class="asterisco">*</span></label>
    <input id="nome" formControlName="nome" placeholder="Nome" [class.invalid]="form.get('nome')?.invalid && form.get('nome')?.touched" />
    <div class="erro" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <div class="campo-obrigatorio">
    <label for="dataNascimento">Data de Nascimento: <span class="asterisco">*</span></label>
    <input id="dataNascimento" formControlName="dataNascimento" type="date" placeholder="Data de Nascimento" [class.invalid]="form.get('dataNascimento')?.invalid && form.get('dataNascimento')?.touched" />
    <div class="erro" *ngIf="form.get('dataNascimento')?.invalid && form.get('dataNascimento')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <div>
    <label for="paisNatal">País Natal:</label>
    <input id="paisNatal" formControlName="paisNatal" placeholder="País Natal" />
  </div>
  
  <div>
    <label for="estadoNatal">Estado Natal:</label>
    <input id="estadoNatal" formControlName="estadoNatal" placeholder="Estado Natal" />
  </div>
  
  <div>
    <label for="naturalidade">Naturalidade:</label>
    <input id="naturalidade" formControlName="naturalidade" placeholder="Naturalidade" />
  </div>
  
  <div>
    <label for="nomeSocial">Nome Social:</label>
    <input id="nomeSocial" formControlName="nomeSocial" placeholder="Nome Social" />
  </div>
  
  <div>
    <label for="estadoCivil">Estado Civil:</label>
    <input id="estadoCivil" formControlName="estadoCivil" placeholder="Estado Civil" />
  </div>
  
  <div>
    <label for="nacionalidade">Nacionalidade:</label>
    <input id="nacionalidade" formControlName="nacionalidade" placeholder="Nacionalidade" />
  </div>
  
  <div class="campo-obrigatorio">
    <label for="email">E-mail: <span class="asterisco">*</span></label>
    <input id="email" formControlName="email" type="email" placeholder="E-mail" [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
    <div class="erro" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <div class="campo-obrigatorio">
    <label for="sexo">Sexo: <span class="asterisco">*</span></label>
    <input id="sexo" formControlName="sexo" placeholder="Sexo" [class.invalid]="form.get('sexo')?.invalid && form.get('sexo')?.touched" />
    <div class="erro" *ngIf="form.get('sexo')?.invalid && form.get('sexo')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <h2>Documentos</h2>
  <div>
    <label for="cpf">CPF:</label>
    <input id="cpf" formControlName="cpf" placeholder="Número" />
  </div>
  
  <h2>Endereço</h2>
  <div class="campo-obrigatorio">
    <label for="telefone1">Telefone I: <span class="asterisco">*</span></label>
    <input id="telefone1" formControlName="telefone1" placeholder="Telefone I" [class.invalid]="form.get('telefone1')?.invalid && form.get('telefone1')?.touched" />
    <div class="erro" *ngIf="form.get('telefone1')?.invalid && form.get('telefone1')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <div>
    <label for="telefone2">Telefone II:</label>
    <input id="telefone2" formControlName="telefone2" placeholder="Telefone II" />
  </div>
  
  <h2>Informações Adicionais</h2>
  <div>
    <label for="corRaca">Cor/Raça:</label>
    <input id="corRaca" formControlName="corRaca" placeholder="Cor/Raça" />
  </div>
  
  <div class="campo-obrigatorio">
    <label for="autorizacaoDados">Autorizo a utilização de dados pessoais: <span class="asterisco">*</span></label>
    <select id="autorizacaoDados" formControlName="autorizacaoDados" [class.invalid]="form.get('autorizacaoDados')?.invalid && form.get('autorizacaoDados')?.touched">
      <option value="">Selecione</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>
    <div class="erro" *ngIf="form.get('autorizacaoDados')?.invalid && form.get('autorizacaoDados')?.touched">
      <span>Campo obrigatório</span>
    </div>
  </div>
  
  <h2>Dados Gerais de Estrangeiros</h2>
  <div>
    <label for="tipoVisto">Tipo de Visto:</label>
    <input id="tipoVisto" formControlName="tipoVisto" placeholder="Tipo de Visto" />
  </div>
  
  <div>
    <label for="numeroRegistroGeral">Número registro geral:</label>
    <input id="numeroRegistroGeral" formControlName="numeroRegistroGeral" placeholder="Número registro geral" />
  </div>
  
  <div>
    <label for="dataVencimentoRG">Data vencimento RG:</label>
    <input id="dataVencimentoRG" formControlName="dataVencimentoRG" type="date" placeholder="Data vencimento RG" />
  </div>
  
  <div class="botoes">
    <button type="button" (click)="onAnterior()">Anterior</button>
    <button type="submit">Próximo</button>
  </div>
</form>
